services:
  - type: web
    name: work-16
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://work-16.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "4096"
      - key: OPENAI_TIMEOUT_SECONDS
        value: "90"
      - key: OPENAI_MAX_RETRIES
        value: "3"
      - key: OPENAI_MAX_FILE_BYTES
        value: "10485760"
      - key: OPENAI_MAX_IMAGE_PX
        value: "6000"
      - key: MAX_EXTRACTED_TEXT_CHARS
        value: "60000"
      - key: MAX_UPLOAD_BYTES
        value: "26214400"
      - key: DATABASE_URL
        value: sqlite:///./data/mikro_busway.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
