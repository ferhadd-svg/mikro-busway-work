services:
  - type: web
    name: work-16
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    autoDeployTrigger: checksPass
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://work-16.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-5
      - key: CLAUDE_MAX_TOKENS
        value: "4096"
      - key: CLAUDE_TIMEOUT_SECONDS
        value: "90"
      - key: CLAUDE_MAX_RETRIES
        value: "3"
      - key: CLAUDE_MAX_FILE_BYTES
        value: "10485760"
      - key: CLAUDE_MAX_IMAGE_PX
        value: "2000"
      - key: MAX_EXTRACTED_TEXT_CHARS
        value: "60000"
      - key: MAX_UPLOAD_BYTES
        value: "26214400"
      - key: DATABASE_URL
        value: sqlite:///./data/mikro_busway.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
