services:
  - type: web
    name: work-16
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m app.seed
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"    # pin so pip finds prebuilt wheels for pymupdf/Pillow (build can't fail)
      - key: ANTHROPIC_API_KEY
        sync: false        # secret — set the value in the Render dashboard (Environment tab), not in this file
      - key: DATABASE_URL
        value: sqlite:///./data/mikro_busway.db
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
